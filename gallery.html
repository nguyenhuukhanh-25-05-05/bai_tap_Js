<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Gallery - Luyện tập JS</title>
    <link rel="stylesheet" href="gallery.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Product Explorer</h1>
            <p>Sử dụng JavaScript để tìm kiếm, lọc và sắp xếp sản phẩm!</p>
        </header>

        <section class="controls">
            <!-- Tìm kiếm -->
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Tìm kiếm sản phẩm...">
            </div>

            <!-- Lọc theo danh mục -->
            <div class="filter-group" id="filterGroup">
                <button class="btn-filter active" data-category="all">Tất cả</button>
                <button class="btn-filter" data-category="Electronics">Điện tử</button>
                <button class="btn-filter" data-category="Fashion">Thời trang</button>
                <button class="btn-filter" data-category="Home">Nhà cửa</button>
            </div>

            <!-- Sắp xếp -->
            <div class="sort-wrapper">
                <select id="sortSelect">
                    <option value="default">Sắp xếp theo</option>
                    <option value="price-low">Giá: Thấp đến Cao</option>
                    <option value="price-high">Giá: Cao đến Thấp</option>
                    <option value="name-az">Tên: A-Z</option>
                </select>
            </div>
        </section>

        <!-- Lưới sản phẩm -->
        <main class="product-grid" id="productGrid">
            <!-- Sản phẩm sẽ được render bằng JS tại đây -->
        </main>

        <!-- Trạng thái trống (hiển thị khi không tìm thấy kết quả) -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-box-open"></i>
            <h3>Không tìm thấy sản phẩm nào</h3>
            <p>Thử tìm kiếm với từ khóa khác nhé!</p>
        </div>
    </div>

    <!-- Script luyện tập JS -->
    <script src="gallery.js"></script>
</body>

</html>
