<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Gallery - Luyện tập JS</title>
    <link rel="stylesheet" href="gallery.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-main">
                <h1>Product Explorer</h1>
                <div class="cart-icon-wrapper" id="cartToggle">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
            <p>Sử dụng JavaScript để tìm kiếm, lọc và sắp xếp sản phẩm!</p>
        </header>

        <section class="controls">
            <!-- Tìm kiếm -->
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Tìm kiếm sản phẩm...">
                <i class="fas fa-times-circle" id="clearSearch" style="display: none;"></i>
            </div>

            <!-- Lọc theo danh mục -->
            <div class="filter-group" id="filterGroup">
                <button class="btn-filter active" data-category="all">Tất cả</button>
                <button class="btn-filter" data-category="Electronics">Điện tử</button>
                <button class="btn-filter" data-category="Fashion">Thời trang</button>
                <button class="btn-filter" data-category="Home">Nhà cửa</button>
            </div>

            <!-- Sắp xếp -->
            <div class="sort-wrapper">
                <select id="sortSelect">
                    <option value="default">Sắp xếp theo</option>
                    <option value="price-low">Giá: Thấp đến Cao</option>
                    <option value="price-high">Giá: Cao đến Thấp</option>
                    <option value="name-az">Tên: A-Z</option>
                </select>
            </div>
        </section>

        <!-- Lưới sản phẩm -->
        <main class="product-grid" id="productGrid">
            <!-- Sản phẩm sẽ được render bằng JS tại đây -->
        </main>

        <!-- Trạng thái trống (hiển thị khi không tìm thấy kết quả) -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-box-open"></i>
            <h3>Không tìm thấy sản phẩm nào</h3>
            <p>Thử tìm kiếm với từ khóa khác nhé!</p>
        </div>
    </div>

    <!-- Giỏ hàng Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Giỏ hàng của bạn</h2>
            <button class="close-cart" id="closeCart"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Items sẽ được render tại đây -->
        </div>
        <div class="cart-footer">
            <div class="total-price">
                <span>Tổng cộng:</span>
                <span id="cartTotal">0₫</span>
            </div>
            <button class="checkout-btn">Thanh toán ngay</button>
        </div>
    </div>

    <!-- Lớp phủ khi mở giỏ hàng -->
    <div class="overlay" id="overlay"></div>

    <!-- Modal Chi tiết Sản phẩm -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="close-modal" id="closeModal"><i class="fas fa-times"></i></button>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Script luyện tập JS -->
    <script src="gallery.js"></script>
</body>

</html>
